<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1"
    >

    <title>
        VPN Service
    </title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <style>

        body {

            background:
                radial-gradient(circle at top left, #1f1f2e, transparent 30%),
                radial-gradient(circle at bottom right, #3b1d52, transparent 30%),
                #0f0f13;

            color: white;

            min-height: 100vh;

            overflow-x: hidden;
        }

        html {
            scroll-behavior: smooth;
        }

        .glass-card {

            background: rgba(255,255,255,0.05);

            backdrop-filter: blur(15px);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 28px;
        }

        .gradient-text {

            background:
                linear-gradient(90deg, #ff4fd8, #7a5cff);

            -webkit-background-clip: text;

            -webkit-text-fill-color: transparent;
        }

        .custom-input {

            background: rgba(255,255,255,0.08) !important;

            border: 1px solid rgba(255,255,255,0.08) !important;

            color: white !important;

            border-radius: 16px !important;

            padding: 14px !important;
        }

        .custom-input::placeholder {

            color: #cfcfe3 !important;

            opacity: 1;
        }

        .custom-input:focus {

            background: rgba(255,255,255,0.12) !important;

            color: white !important;

            border-color: #7a5cff !important;

            box-shadow: none !important;
        }

        .form-floating label {

            color: #cfcfe3 !important;
        }

        .btn-purple {

            background:
                linear-gradient(90deg, #7a5cff, #ff4fd8);

            border: none;

            border-radius: 16px;

            padding: 12px;

            color: white;

            font-weight: 600;

            transition: 0.3s;
        }

        .btn-purple:hover {

            opacity: 0.9;

            transform: scale(1.02);
        }

        .table-dark-custom {

            background: rgba(255,255,255,0.05);

            border-radius: 24px;

            overflow: hidden;

            border: 1px solid rgba(255,255,255,0.08);
        }

        .table-dark-custom table {

            color: white;
        }

        .table-dark-custom thead {

            background: rgba(255,255,255,0.08);
        }

        .table-dark-custom tbody tr {

            border-color: rgba(255,255,255,0.06);
        }

        .table-dark-custom td,
        .table-dark-custom th {

            background: transparent !important;

            color: white !important;
        }

    </style>

</head>

<body>

<main>

    {% block content %}{% endblock %}

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
